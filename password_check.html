<div>
    <label>Enter Password: </label>
    <input type="password" id="pass" oninput="checkStrength()">
    <p id="feedback"></p>
</div>

<script>
    function checkStrength() {
        const password = document.getElementById("pass").value;
        const feedback = document.getElementById("feedback");
        
        // Evaluate strength based on length
        if (password.length === 0) {
            feedback.innerText = "";
        } else if (password.length < 6 && password.length >0 ) {
            document.getElementById("feedback").innerText="Strength : Weak";
            feedback.style.color = "red";
        } else if (password.length < 10 && password.length > 5) {
            feedback.innerText = "Strength: Medium";
            feedback.style.color = "orange";
        } else {
            feedback.innerText = "Strength: Strong";
            feedback.style.color = "green";
        }
    }
</script>
